apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: worker-cpu
spec:
  scalingStrategy:
    strategy: eager
  minReplicaCount: 0
  maxReplicaCount: 2
  pollingInterval: 15
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  triggers:
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: rq:queue:jobs:cpu
        listLength: "1"
  jobTargetRef:
    backoffLimit: 0  # Changed to 0. If MPI crashes, retrying immediately often just deadlocks again.
    template:
      spec:
        restartPolicy: Never
        activeDeadlineSeconds: 3600 # Force K8s to kill the pod if it hangs longer than 1 hour
        containers:
          - name: worker
            image: worker-cpu
            # Require at least 4 cores if ANUGA_NPROCS=4 is default
            resources: 
              requests:
                cpu: "8" 
              limits:
                cpu: "8"
            envFrom:
              - configMapRef:
                  name: app-config
              - secretRef:
                  name: app-secrets
            env:
              - name: QUEUE
                value: "jobs:cpu"
              - name: PYTHONUNBUFFERED  # <-- ADD THIS
                value: "1"              # <-- ADD THIS
            # 1. MOUNT SHARED MEMORY HERE
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
        # 2. DEFINE THE IN-MEMORY VOLUME HERE
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "16Gi" # Adjust this based on your mesh size
