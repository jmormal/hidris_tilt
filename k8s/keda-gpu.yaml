# ─────────────────────────────────────────────────────────────────────────────
# GPU worker ScaledJob. Spawns one Job per item on jobs:gpu.
# Image: worker-gpu (CUDA base + torch). Run-once: LPOP one item, process,
# exit 0 — the pod releases the GPU on exit. minReplicaCount 0 = no idle GPU.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: worker-gpu
spec:
  scalingStrategy:
    strategy: eager
  minReplicaCount: 0
  maxReplicaCount: 4
  pollingInterval: 15
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  triggers:
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: rq:queue:jobs:gpu
        listLength: "1"
  jobTargetRef:
    backoffLimit: 3
    template:
      spec:
        restartPolicy: Never
        containers:
          - name: worker
            image: worker-gpu
            envFrom:
              - configMapRef:
                  name: app-config
              - secretRef:
                  name: app-secrets
            env:
              - name: QUEUE
                value: "jobs:gpu"
              - name: PYTHONUNBUFFERED  # <-- ADD THIS
                value: "1"              # <-- ADD THIS
            resources:
              requests:
                memory: "24Gi"
                cpu: "2"
              limits:
                memory: "28Gi"
                nvidia.com/gpu: 1
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
        # 2. DEFINE THE IN-MEMORY VOLUME HERE
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "16Gi" # Adjust this based on your mesh size
